<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- CONFETTI CANVAS -->
  <canvas id="confetti-canvas"></canvas>

  <!-- APP WRAPPER -->
  <div class="app">

    <!-- HEADER -->
    <header class="header">
      <div class="header-left">
        <span class="logo-mark">✕○</span>
        <h1 class="title">Tic-Tac-Toe</h1>
      </div>
      <div class="header-right">
        <button class="icon-btn" id="theme-toggle" title="Toggle Theme" aria-label="Toggle Theme">
          <span class="theme-icon">☀️</span>
        </button>
        <button class="icon-btn" id="stats-btn" title="Statistics" aria-label="View Statistics">
          <span>📊</span>
        </button>
      </div>
    </header>

    <!-- MODE & DIFFICULTY SELECTORS -->
    <div class="controls-bar">
      <div class="seg-control" id="mode-selector" role="group" aria-label="Game Mode">
        <button class="seg-btn active" data-mode="pvp">👥 2 Players</button>
        <button class="seg-btn" data-mode="pva">🤖 vs AI</button>
      </div>
      <div class="seg-control difficulty-bar hidden" id="difficulty-selector" role="group" aria-label="AI Difficulty">
        <button class="seg-btn active" data-diff="easy">Easy</button>
        <button class="seg-btn" data-diff="medium">Medium</button>
        <button class="seg-btn" data-diff="hard">Hard</button>
      </div>
    </div>

    <!-- PLAYER NAME CUSTOMIZATION -->
    <div class="names-row" id="names-row">
      <div class="name-field">
        <span class="player-badge x-badge">X</span>
        <input class="name-input" id="name-x" type="text" value="Player X" maxlength="12" aria-label="Player X Name" />
      </div>
      <span class="vs-label">VS</span>
      <div class="name-field">
        <span class="player-badge o-badge">O</span>
        <input class="name-input" id="name-o" type="text" value="Player O" maxlength="12" aria-label="Player O Name" />
      </div>
    </div>

    <!-- SCOREBOARD -->
    <div class="scoreboard">
      <div class="score-pill x-pill">
        <span class="score-label" id="score-label-x">Player X</span>
        <span class="score-value" id="score-x">0</span>
      </div>
      <div class="score-pill draw-pill">
        <span class="score-label">Draws</span>
        <span class="score-value" id="score-draw">0</span>
      </div>
      <div class="score-pill o-pill">
        <span class="score-label" id="score-label-o">Player O</span>
        <span class="score-value" id="score-o">0</span>
      </div>
    </div>

    <!-- STATUS LINE -->
    <div class="status-bar" id="status-bar" aria-live="polite">
      <div class="status-indicator" id="status-indicator"></div>
      <span class="status-text" id="status-text">Player X's turn</span>
    </div>

    <!-- GAME BOARD -->
    <div class="board-container">
      <div class="board" id="board" role="grid" aria-label="Game Board">
        <!-- Cells generated by JS -->
      </div>
    </div>

    <!-- MOVE HISTORY + UNDO -->
    <div class="history-row">
      <div class="history-box">
        <span class="history-label">Moves</span>
        <ol class="move-list" id="move-list" reversed></ol>
      </div>
      <button class="undo-btn" id="undo-btn" disabled title="Undo Last Move">↩ Undo</button>
    </div>

    <!-- GAME CONTROLS -->
    <div class="btn-row">
      <button class="ctrl-btn primary" id="new-game-btn">New Game</button>
      <button class="ctrl-btn secondary" id="restart-btn">Restart</button>
      <button class="ctrl-btn danger" id="reset-scores-btn">Reset Scores</button>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
    <span class="footer-accent">Tic-Tac-Toe</span> </footer>

  </div><!-- end .app -->

  <!-- STATS MODAL -->
  <div class="modal-overlay hidden" id="stats-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Game Statistics</h2>
        <button class="icon-btn close-btn" id="close-stats" aria-label="Close">✕</button>
      </div>
      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-val" id="stat-total">0</span>
          <span class="stat-lbl">Total Games</span>
        </div>
        <div class="stat-card">
          <span class="stat-val" id="stat-winx">0%</span>
          <span class="stat-lbl">X Win Rate</span>
        </div>
        <div class="stat-card">
          <span class="stat-val" id="stat-wino">0%</span>
          <span class="stat-lbl">O Win Rate</span>
        </div>
        <div class="stat-card">
          <span class="stat-val" id="stat-draw">0%</span>
          <span class="stat-lbl">Draw Rate</span>
        </div>
      </div>
      <button class="ctrl-btn danger full-btn" id="clear-all-btn">Clear All Data</button>
    </div>
  </div>

  <!-- WIN OVERLAY -->
  <div class="win-overlay hidden" id="win-overlay">
    <div class="win-card">
      <div class="win-emoji" id="win-emoji">🏆</div>
      <div class="win-title" id="win-title">Player X Wins!</div>
      <div class="win-sub" id="win-sub">Magnificent!</div>
      <div class="win-btns">
        <button class="ctrl-btn primary" id="play-again-btn">Play Again</button>
        <button class="ctrl-btn secondary" id="close-win-btn">Close</button>
      </div>
    </div>
  </div>

  <!-- TIMER -->
  <div class="timer-bar hidden" id="timer-bar">
    <div class="timer-label">Turn timer</div>
    <div class="timer-track"><div class="timer-fill" id="timer-fill"></div></div>
    <div class="timer-val" id="timer-val">15</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
